services:
  - type: web
    name: projeto-vendas-mvc
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PERSISTENT_DATA_DIR
        value: /data
    disk:
      name: dados-projeto-vendas
      mountPath: /data
      sizeGB: 1
